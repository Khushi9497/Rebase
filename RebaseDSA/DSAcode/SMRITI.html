<!DOCTYPE html>
<html>
<head>
    <title>Heart Message</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ffe6f0;
            font-family: Arial, sans-serif;
        }

        .heart {
            width: 300px;
            height: 270px;
            background: red;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;

            /* Heart Shape */
            clip-path: path("M150 270 L20 120 A70 70 0 0 1 150 70 A70 70 0 0 1 280 120 Z");
        }

        .message {
            display: none;
        }
    </style>
</head>
<body>

<div class="heart" onclick="showMessage()">
    <div id="loveMessage" class="message">I LOVE SMRITI</div>
</div>

<script>
    function showMessage() {
        document.getElementById("loveMessage").style.display = "block";
    }
</script>

</body>
</html>
